<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選挙準備進捗管理</title>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1710;
    --surface2: #221f18;
    --border: #2e2820;
    --accent: #f77f00;
    --accent2: #e05c00;
    --text: #e8eaf6;
    --text2: #b5a890;
    --text3: #857060;
    --done: #2ecc71;
    --doing: #f39c12;
    --none: #2e3350;
    --skip: #2e2820;
    --skip-text: #8a7a6a;
    --danger: #e74c3c;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; min-height: 100vh; }

  /* Header */
  .header { padding: 20px 24px 0; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-stats { margin-left: auto; display: flex; gap: 16px; }
  .stat-pill { background: var(--surface); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; padding: 20px 24px 0; }
  .tab { padding: 10px 20px; border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text3); background: transparent; border: none; transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* Content */
  .content { background: var(--surface); border-radius: 0 var(--radius) var(--radius) var(--radius); margin: 0 24px 24px; padding: 24px; min-height: calc(100vh - 140px); }

  /* ===== 一覧表タブ ===== */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin: 20px 0 8px; }
  .heatmap-section-label:first-child { margin-top: 0; }

  .heatmap-table { border-collapse: separate; border-spacing: 3px; width: max-content; }
  .heatmap-table th { font-size: 11px; color: var(--text3); font-weight: 500; padding: 4px 8px; white-space: nowrap; text-align: left; }
  .heatmap-table th.candidate-col { min-width: 100px; }
  .heatmap-table th.item-col { min-width: 60px; max-width: 80px; writing-mode: vertical-rl; text-orientation: mixed; height: 90px; vertical-align: bottom; padding-bottom: 6px; }

  .heatmap-table td.candidate-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; padding-right: 12px; }
  .heatmap-table td.candidate-name span { display: block; font-size: 10px; color: var(--text3); font-weight: 400; }

  .cell { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; position: relative; }
  .cell:hover { transform: scale(1.15); z-index: 10; }
  .cell.status-0 { background: var(--none); }
  .cell.status-1 { background: var(--doing); }
  .cell.status-2 { background: var(--done); }
  .cell.status-3 { background: var(--skip); position: relative; overflow: hidden; }
  .cell.status-3::after { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: var(--skip-text); transform: rotate(-45deg); }
  .cell.status-1 { background: var(--doing); }
  .cell.status-2 { background: var(--done); }
  .cell-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4); }
  .cell.status-1 .cell-dot { background: rgba(255,255,255,0.7); }
  .cell.status-2 .cell-dot { background: rgba(255,255,255,0.8); }

  /* ===== 候補者タブ ===== */
  .candidate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .candidate-card { background: var(--surface2); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; position: relative; }
  .candidate-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .candidate-card .drag-handle { position: absolute; top: 12px; right: 12px; color: var(--text3); cursor: grab; font-size: 14px; }
  .candidate-card.dragging { opacity: 0.4; }
  .candidate-card.drag-over { border-color: var(--accent2); background: #2a2d45; }

  .card-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; margin-bottom: 12px; overflow: hidden; }
  .card-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .card-yomi { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .card-type { font-size: 11px; background: var(--surface); padding: 2px 8px; border-radius: 10px; color: var(--accent); display: inline-block; margin-bottom: 8px; }
  .card-catch { font-size: 12px; color: var(--text2); font-style: italic; margin-bottom: 12px; line-height: 1.5; }

  .card-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .card-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--done)); border-radius: 2px; transition: width 0.3s; }
  .card-progress-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* Candidate Detail */
  .back-btn { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 14px; cursor: pointer; margin-bottom: 20px; background: none; border: none; }
  .back-btn:hover { color: var(--text); }

  .detail-header { display: flex; gap: 20px; margin-bottom: 24px; align-items: flex-start; }
  .detail-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
  .detail-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .detail-info h2 { font-size: 24px; font-weight: 700; }
  .detail-info .yomi { color: var(--text3); font-size: 13px; margin-bottom: 6px; }
  .detail-info .etype { color: var(--accent); font-size: 12px; background: var(--surface2); padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
  .detail-info .catch { color: var(--text2); font-style: italic; font-size: 14px; }

  .detail-items-section { margin-top: 8px; }
  .detail-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); margin: 20px 0 10px; }
  .detail-item-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 4px; cursor: pointer; transition: background 0.15s; }
  .detail-item-row:hover { background: #2a2d45; }
  .detail-item-status { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; }
  .detail-item-status.status-0 { background: var(--none); }
  .detail-item-status.status-1 { background: var(--doing); }
  .detail-item-status.status-2 { background: var(--done); }
  .detail-item-status.status-3 { background: var(--skip); }
  .detail-item-name { font-size: 14px; flex: 1; }
  .detail-item-assignee { font-size: 12px; color: var(--text3); }
  .detail-item-memo { font-size: 11px; color: var(--text3); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== 設定タブ ===== */
  .settings-section { margin-bottom: 32px; }
  .settings-section h3 { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 16px; letter-spacing: 0.08em; }

  .settings-list { display: flex; flex-direction: column; gap: 8px; }
  .settings-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .settings-item-info { flex: 1; }
  .settings-item-name { font-size: 14px; font-weight: 600; }
  .settings-item-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .settings-item-actions { display: flex; gap: 8px; }

  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6b8fff; }
  .btn-secondary { background: var(--surface); color: var(--text2); }
  .btn-secondary:hover { color: var(--text); background: var(--border); }
  .btn-danger { background: transparent; color: var(--danger); }
  .btn-danger:hover { background: rgba(231,76,60,0.1); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-add { display: flex; align-items: center; gap: 8px; margin-top: 12px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal { background: var(--surface2); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 28px; }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-title-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; margin-top: -14px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.06em; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); padding: 10px 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group-photo label { margin-bottom: 8px; display: block; font-size: 12px; color: var(--text3); font-weight: 600; }
  .photo-upload-area { border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .photo-upload-area:hover { border-color: var(--accent); }
  .photo-upload-area img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }
  .photo-upload-area p { font-size: 12px; color: var(--text3); }

  .status-selector { display: flex; gap: 8px; }
  .status-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 2px solid transparent; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .status-btn.s0 { background: var(--none); color: var(--text3); }
  .status-btn.s1 { background: rgba(243,156,18,0.2); color: var(--doing); border-color: transparent; }
  .status-btn.s2 { background: rgba(46,204,113,0.2); color: var(--done); border-color: transparent; }
  .status-btn.s0.active { border-color: var(--text3); }
  .status-btn.s1.active { border-color: var(--doing); background: rgba(243,156,18,0.3); }
  .status-btn.s2.active { border-color: var(--done); background: rgba(46,204,113,0.3); }
  .status-btn.s3 { background: var(--skip); color: var(--skip-text); border-color: transparent; }
  .status-btn.s3.active { border-color: var(--skip-text); background: var(--skip); }

  .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  /* SNS section in form */
  .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { color: var(--text3); font-size: 14px; margin-bottom: 20px; }

  /* Legend */
  .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; }

  /* Responsive */
  @media (max-width: 640px) {
    .header { padding: 16px 16px 0; }
    .header h1 { font-size: 16px; }
    .header-stats { display: none; }
    .tabs { padding: 16px 16px 0; }
    .tab { padding: 8px 14px; font-size: 13px; }
    .content { margin: 0 16px 16px; padding: 16px; }
    .candidate-grid { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .sns-grid { grid-template-columns: 1fr; }
    .detail-header { flex-direction: column; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🗳 選挙準備 進捗管理</h1>
  <div class="header-stats" id="headerStats"></div>
  <button class="btn btn-secondary" onclick="exportCSV()" style="font-size:12px;padding:6px 12px">📥 CSV</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('candidates')">候補者</button>
  <button class="tab" onclick="switchTab('heatmap')">一覧表</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>

<div class="content" id="mainContent"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

async function sbFetch(table, method='GET', body=null, query='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  if (method === 'GET') return res.json();
  return res;
}

// ===== DATA =====
const DEFAULT_POLITICAL_ITEMS = [
  '党の立候補者タスキ','2連のぼり','2連ポスター','名刺','DIY号外',
  'リーフレット（二つ折り・後援会）','看板（後援会事務所）','看板（個人事務所）',
  '後援会加入募集シート','後援会紹介者シート','Youtube広告','2連はちまき','広報車音源'
];
const DEFAULT_ELECTION_ITEMS = [
  '公設ポスター','証紙ビラ','選挙はがき','候補者タスキ','選挙公報','選挙カーはちまき',
  '選挙事務所看板','ショート動画用バナー','ショート動画','投票依頼バナー',
  'カウントダウンバナー','毎日スケジュールバナー','個人演説会告知バナー',
  '街頭演説会告知バナー','当選バナー'
];

let APP = {
  candidates: [],
  items: { political: [...DEFAULT_POLITICAL_ITEMS], election: [...DEFAULT_ELECTION_ITEMS] },
  progress: {}
};

async function loadData() {
  showLoading(true);
  try {
    const [cands, progs, settings] = await Promise.all([
      sbFetch('candidates', 'GET', null, '?order=sort_order.asc'),
      sbFetch('progress', 'GET', null, '?limit=10000'),
      sbFetch('app_settings', 'GET', null, '')
    ]);
    APP.candidates = (cands||[]).map(r => ({id: r.id, ...r.data}));
    APP.progress = {};
    (progs||[]).forEach(r => { APP.progress[r.key] = r.data; });
    const itemsSetting = (settings||[]).find(r => r.key === 'items');
    if (itemsSetting) APP.items = itemsSetting.data;
  } catch(e) {
    console.error('Load error:', e);
    showToast('データ読み込みエラー', true);
  }
  showLoading(false);
}

async function saveData() {
  try {
    // Save candidates
    for (let i = 0; i < APP.candidates.length; i++) {
      const c = APP.candidates[i];
      const {id, ...data} = c;
      await sbFetch('candidates', 'POST', {id, data, sort_order: i});
    }
    // Save items setting
    await sbFetch('app_settings', 'POST', {key: 'items', data: APP.items});
  } catch(e) {
    console.error('Save error:', e);
    showToast('保存エラー', true);
  }
}

async function saveProgress(key, value) {
  try {
    await sbFetch('progress', 'POST', {key, data: value});
    APP.progress[key] = value;
  } catch(e) {
    showToast('保存エラー', true);
  }
}

async function deleteCandidate(id) {
  if (!confirm('この候補者を削除しますか？')) return;
  try {
    await sbFetch('candidates', 'DELETE', null, `?id=eq.${id}`);
    // Delete related progress
    const keys = Object.keys(APP.progress).filter(k => k.startsWith(id+'__'));
    for (const k of keys) {
      await sbFetch('progress', 'DELETE', null, `?key=eq.${encodeURIComponent(k)}`);
    }
    APP.candidates = APP.candidates.filter(x => x.id !== id);
    keys.forEach(k => delete APP.progress[k]);
    render();
  } catch(e) {
    showToast('削除エラー', true);
  }
}
let currentTab = 'candidates';
let currentCandidateId = null;
let dragSrcIndex = null;

// ===== UTILS =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function getInitial(name) { return name ? name.slice(0,1) : '?'; }
function getProgress(cid) {
  const allItems = [...APP.items.political, ...APP.items.election];
  if (!allItems.length) return 0;
  let done = 0, skip = 0;
  allItems.forEach(item => {
    const key = `${cid}__${item}`;
    const s = APP.progress[key] ? APP.progress[key].status : 0;
    if (s === 2) done++;
    if (s === 3) skip++;
  });
  const effective = allItems.length - skip;
  if (effective <= 0) return 100;
  return Math.round(done / effective * 100);
}
function getStatusCount() {
  let done=0, doing=0, none=0, skip=0;
  APP.candidates.forEach(c => {
    const allItems = [...APP.items.political, ...APP.items.election];
    allItems.forEach(item => {
      const k = `${c.id}__${item}`;
      const s = APP.progress[k] ? APP.progress[k].status : 0;
      if (s===2) done++; else if (s===1) doing++; else if (s===3) skip++; else none++;
    });
  });
  return {done, doing, none, skip};
}

// ===== TAB SWITCH =====
function switchTab(tab) {
  currentTab = tab;
  currentCandidateId = null;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['candidates','heatmap','settings'][i] === tab);
  });
  render();
}

// ===== RENDER =====
function render() {
  renderStats();
  if (currentTab === 'candidates') {
    if (currentCandidateId) renderCandidateDetail();
    else renderCandidates();
  } else if (currentTab === 'heatmap') {
    renderHeatmap();
  } else {
    renderSettings();
  }
}

function renderStats() {
  const sc = getStatusCount();
  const total = sc.done + sc.doing + sc.none;
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill"><div class="stat-dot" style="background:var(--done)"></div>${sc.done}完了</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--doing)"></div>${sc.doing}進行中</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--text3)"></div>${sc.none}未着手</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--skip-text)"></div>${sc.skip}不要</div>
  `;
}

// --- CANDIDATES ---
function renderCandidates() {
  const el = document.getElementById('mainContent');
  if (!APP.candidates.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">👤</div><p>候補者がまだいません<br>設定タブから追加してください</p><button class="btn btn-primary" onclick="switchTab('settings')">設定へ</button></div>`;
    return;
  }
  el.innerHTML = `<div class="candidate-grid" id="candidateGrid">${APP.candidates.map((c,i) => candidateCardHTML(c,i)).join('')}</div>`;
  setupDragDrop();
}

function candidateCardHTML(c, i) {
  const prog = getProgress(c.id);
  const avatarInner = c.photo
    ? `<img src="${c.photo}" alt="${c.name}">`
    : `<span>${getInitial(c.name)}</span>`;
  return `
    <div class="candidate-card" draggable="true" data-index="${i}" data-id="${c.id}" onclick="onCardClick(event,'${c.id}')">
      <div class="drag-handle" title="ドラッグで並び替え" onclick="event.stopPropagation()">⠿</div>
      <div class="card-avatar">${avatarInner}</div>
      <div class="card-name">${c.name || '（名前未設定）'}</div>
      <div class="card-yomi">${c.yomi || ''}</div>
      ${c.electionType ? `<div class="card-type">${c.electionType}</div>` : ''}
      ${c.catchphrase ? `<div class="card-catch">「${c.catchphrase}」</div>` : ''}
      <div>
        <div class="card-progress"><div class="card-progress-bar" style="width:${prog}%"></div></div>
        <div class="card-progress-label">${prog}% 完了</div>
      </div>
    </div>`;
}

function onCardClick(e, id) {
  // ドラッグ後のクリックは無視
  if (dragSrcIndex !== null) return;
  openCandidateDetail(id);
}

function openCandidateDetail(id) {
  currentCandidateId = id;
  renderCandidateDetail();
}

function renderCandidateDetail() {
  const c = APP.candidates.find(x => x.id === currentCandidateId);
  if (!c) return;
  const el = document.getElementById('mainContent');
  const allItems = [...APP.items.political, ...APP.items.election];
  const prog = getProgress(c.id);

// Image editor state
let _editorImg = null, _editorScale = 1, _editorX = 0, _editorY = 0, _editorDragging = false, _editorDragStart = null;

function previewPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      _editorImg = img;
      _editorScale = 1;
      _editorX = 0; _editorY = 0;
      openImageEditor();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function openImageEditor() {
  // Remove any existing editor
  const existing = document.getElementById('imgEditorOverlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'imgEditorOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#1a1d27;border-radius:12px;padding:24px;width:320px;max-width:95vw">
      <h3 style="color:#e8eaf6;margin-bottom:16px;font-size:16px">写真を調整</h3>
      <div style="position:relative;width:240px;height:240px;border-radius:50%;overflow:hidden;margin:0 auto 16px;background:#0f1117;cursor:grab" id="editorCanvas">
        <canvas id="editorCvs" width="240" height="240" style="display:block"></canvas>
      </div>
      <div style="margin-bottom:12px">
        <label style="color:#8890b5;font-size:12px;display:block;margin-bottom:6px">拡大縮小</label>
        <input type="range" id="editorScale" min="0.5" max="3" step="0.01" value="1" style="width:100%" oninput="onEditorScale(this.value)">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button onclick="closeImageEditor()" style="padding:8px 16px;border-radius:8px;background:#222637;color:#8890b5;border:none;cursor:pointer;font-size:13px">キャンセル</button>
        <button onclick="confirmImageEditor()" style="padding:8px 16px;border-radius:8px;background:#4f7cff;color:white;border:none;cursor:pointer;font-size:13px;font-weight:600">確定</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const cvs = document.getElementById('editorCvs');
  const container = document.getElementById('editorCanvas');

  // Auto-fit scale
  const fit = Math.max(240 / _editorImg.width, 240 / _editorImg.height);
  _editorScale = fit;
  _editorX = (240 - _editorImg.width * fit) / 2;
  _editorY = (240 - _editorImg.height * fit) / 2;
  document.getElementById('editorScale').min = fit * 0.8;
  document.getElementById('editorScale').value = fit;
  drawEditor();

  // Drag
  container.addEventListener('mousedown', startDrag);
  container.addEventListener('touchstart', startDrag, {passive:true});
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('touchmove', moveDrag, {passive:false});
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
}

function drawEditor() {
  const cvs = document.getElementById('editorCvs');
  if (!cvs || !_editorImg) return;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, 240, 240);
  ctx.drawImage(_editorImg, _editorX, _editorY, _editorImg.width * _editorScale, _editorImg.height * _editorScale);
}

function onEditorScale(val) {
  const newScale = parseFloat(val);
  const cx = 120, cy = 120;
  _editorX = cx - (cx - _editorX) * (newScale / _editorScale);
  _editorY = cy - (cy - _editorY) * (newScale / _editorScale);
  _editorScale = newScale;
  drawEditor();
}

function startDrag(e) {
  _editorDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  _editorDragStart = {x: pt.clientX - _editorX, y: pt.clientY - _editorY};
  document.getElementById('editorCanvas').style.cursor = 'grabbing';
}
function moveDrag(e) {
  if (!_editorDragging) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  _editorX = pt.clientX - _editorDragStart.x;
  _editorY = pt.clientY - _editorDragStart.y;
  drawEditor();
}
function endDrag() {
  _editorDragging = false;
  const c = document.getElementById('editorCanvas');
  if (c) c.style.cursor = 'grab';
}

function closeImageEditor() {
  const ov = document.getElementById('imgEditorOverlay');
  if (ov) ov.remove();
  window.removeEventListener('mousemove', moveDrag);
  window.removeEventListener('touchmove', moveDrag);
  window.removeEventListener('mouseup', endDrag);
  window.removeEventListener('touchend', endDrag);
}

function confirmImageEditor() {
  const cvs = document.getElementById('editorCvs');
  // 出力は200x200に縮小
  const out = document.createElement('canvas');
  out.width = 200; out.height = 200;
  const ctx = out.getContext('2d');
  ctx.drawImage(cvs, 0, 0, 240, 240, 0, 0, 200, 200);
  const compressed = out.toDataURL('image/jpeg', 0.8);
  closeImageEditor();
  document.getElementById('photoData').value = compressed;
  const prev = document.getElementById('photoPreview');
  if (prev && prev.tagName === 'IMG') { prev.src = compressed; }
  else if (prev) { prev.outerHTML = `<img id="photoPreview" src="${compressed}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:8px">`; }
}

async function saveCandidate(id) {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('氏名は必須です'); return; }
  const data = {
    name, yomi: document.getElementById('f_yomi').value.trim(),
    age: document.getElementById('f_age').value.trim(),
    gender: document.getElementById('f_gender').value,
    electionType: document.getElementById('f_etype').value,
    area: document.getElementById('f_area').value.trim(),
    job: document.getElementById('f_job').value.trim(),
    catchphrase: document.getElementById('f_catch').value.trim(),
    policy: document.getElementById('f_policy').value.trim(),
    profile: document.getElementById('f_profile').value.trim(),
    tel: document.getElementById('f_tel').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    address: document.getElementById('f_address').value.trim(),
    sns_x: document.getElementById('f_x').value.trim(),
    sns_ig: document.getElementById('f_ig').value.trim(),
    sns_yt: document.getElementById('f_yt').value.trim(),
    sns_tt: document.getElementById('f_tt').value.trim(),
    sns_fb: document.getElementById('f_fb').value.trim(),
    note: document.getElementById('f_note').value.trim(),
    photo: document.getElementById('photoData').value
  };
  if (id) {
    const i = APP.candidates.findIndex(x => x.id === id);
    if (i >= 0) APP.candidates[i] = {...APP.candidates[i], ...data};
  } else {
    APP.candidates.push({id: genId(), ...data});
  }
  await saveData();
  document.getElementById('modalOverlay').style.display = 'none';
  render();
}

function openEditItemModal(type, index) {
  const current = APP.items[type][index];
  openModal(`
    <h3>項目を編集</h3>
    <div class="form-group"><label>項目名</label><input id="editItemName" value="${current}"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditItem('${type}',${index})">保存</button>
    </div>`);
}

async function saveEditItem(type, index) {
  const newName = document.getElementById('editItemName').value.trim();
  if (!newName) return;
  const oldName = APP.items[type][index];
  for (const c of APP.candidates) {
    const oldKey = c.id + '__' + oldName;
    const newKey = c.id + '__' + newName;
    if (APP.progress[oldKey]) {
      await sbFetch('progress', 'POST', {key: newKey, data: APP.progress[oldKey]});
      await sbFetch('progress', 'DELETE', null, `?key=eq.${encodeURIComponent(oldKey)}`);
      APP.progress[newKey] = APP.progress[oldKey];
      delete APP.progress[oldKey];
    }
  }
  APP.items[type][index] = newName;
  await saveData();
  closeModal();
  render();
}

async function addItem(type) {
  const name = document.getElementById('newItemName').value.trim();
  if (!name) return;
  APP.items[type].push(name);
  await saveData();
  closeModal();
  render();
}

async function deleteItem(type, index) {
  if (!confirm('この項目を削除しますか？')) return;
  const item = APP.items[type][index];
  APP.items[type].splice(index, 1);
  const toDelete = Object.keys(APP.progress).filter(k => k.endsWith('__'+item));
  for (const k of toDelete) {
    await sbFetch('progress', 'DELETE', null, `?key=eq.${encodeURIComponent(k)}`);
    delete APP.progress[k];
  }
  await saveData();
  render();
}

async function resetAll() {
  if (!confirm('全データをリセットします。元に戻せません。よろしいですか？')) return;
  await sbFetch('candidates', 'DELETE', null, '?id=neq.null');
  await sbFetch('progress', 'DELETE', null, '?key=neq.null');
  await sbFetch('app_settings', 'DELETE', null, '?key=neq.null');
  APP = {
    candidates: [],
    items: { political: [...DEFAULT_POLITICAL_ITEMS], election: [...DEFAULT_ELECTION_ITEMS] },
    progress: {}
  };
  render();
}

// ===== DRAG & DROP =====
let itemDragSrc = null;

function setupDragDrop() {
  const grid = document.getElementById('candidateGrid');
  if (!grid) return;

  grid.addEventListener('dragstart', e => {
    const card = e.target.closest('.candidate-card');
    if (!card) return;
    dragSrcIndex = parseInt(card.dataset.index);
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });

  grid.addEventListener('dragend', e => {
    const card = e.target.closest('.candidate-card');
    if (card) card.classList.remove('dragging');
    grid.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('drag-over'));
    setTimeout(() => { dragSrcIndex = null; }, 50);
  });

  grid.addEventListener('dragover', e => {
    e.preventDefault();
    const card = e.target.closest('.candidate-card');
    if (!card) return;
    grid.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });

  grid.addEventListener('dragleave', e => {
    const card = e.target.closest('.candidate-card');
    if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });

  grid.addEventListener('drop', async e => {
    e.preventDefault();
    const card = e.target.closest('.candidate-card');
    if (!card) return;
    card.classList.remove('drag-over');
    const targetIndex = parseInt(card.dataset.index);
    if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
    const [moved] = APP.candidates.splice(dragSrcIndex, 1);
    APP.candidates.splice(targetIndex, 0, moved);
    dragSrcIndex = null;
    await saveData();
    render();
  });
}
function onDragStart(e, i) {}
function onDragOver(e) { e.preventDefault(); }
function onDragLeave(e) {}
function onDrop(e, targetIndex) {}
function onItemDragStart(e, type, i) {}
function onItemDrop(e, type, targetIndex) {}

function setupItemDragDrop() {
  ['political','election'].forEach(type => {
    const listId = type === 'political' ? 'pItemList' : 'eItemList';
    const list = document.getElementById(listId);
    if (!list) return;

    list.addEventListener('dragstart', e => {
      const item = e.target.closest('.settings-item');
      if (!item) return;
      itemDragSrc = {type, i: parseInt(item.dataset.index)};
      setTimeout(() => item.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    list.addEventListener('dragend', e => {
      list.querySelectorAll('.settings-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
    });

    list.addEventListener('dragover', e => {
      e.preventDefault();
      const item = e.target.closest('.settings-item');
      if (!item) return;
      list.querySelectorAll('.settings-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    list.addEventListener('dragleave', e => {
      const item = e.target.closest('.settings-item');
      if (item && !item.contains(e.relatedTarget)) item.classList.remove('drag-over');
    });

    list.addEventListener('drop', e => {
      e.preventDefault();
      const item = e.target.closest('.settings-item');
      if (!item) return;
      item.classList.remove('drag-over');
      if (!itemDragSrc || itemDragSrc.type !== type) { itemDragSrc = null; return; }
      const targetIndex = parseInt(item.dataset.index);
      if (itemDragSrc.i === targetIndex) { itemDragSrc = null; return; }
      const arr = APP.items[type];
      const [moved] = arr.splice(itemDragSrc.i, 1);
      arr.splice(targetIndex, 0, moved);
      itemDragSrc = null;
      saveData();
      render();
    });
  });
}

// ===== LOADING UI =====
function showLoading(show) {
  let el = document.getElementById('loadingOverlay');
  if (show && !el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px';
    el.innerHTML = '<div style="width:40px;height:40px;border:3px solid #f77f00;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="color:#e8eaf6;font-size:14px">読み込み中...</div>';
    document.body.appendChild(el);
  } else if (!show && el) {
    el.remove();
  }
}

function showToast(msg, isError=false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${isError?'#e74c3c':'#f77f00'};color:white;padding:10px 20px;border-radius:8px;font-size:14px;z-index:400;font-weight:600`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// ===== CSV EXPORT =====
function exportCSV() {
  const allItems = [...APP.items.political, ...APP.items.election];
  const statusLabel = ['未着手','進行中','完了','不要'];
  const headers = ['候補者名', '読み仮名', '選挙種類', '選挙区', ...allItems.map(i => i), ...allItems.map(i => i+'_担当者'), ...allItems.map(i => i+'_メモ')];
  const rows = APP.candidates.map(c => {
    const statuses = allItems.map(item => {
      const p = APP.progress[c.id+'__'+item];
      return statusLabel[p ? p.status : 0];
    });
    const assignees = allItems.map(item => {
      const p = APP.progress[c.id+'__'+item];
      return p ? (p.assignee||'') : '';
    });
    const memos = allItems.map(item => {
      const p = APP.progress[c.id+'__'+item];
      return p ? (p.memo||'') : '';
    });
    return [c.name||'', c.yomi||'', c.electionType||'', c.area||'', ...statuses, ...assignees, ...memos];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '選挙準備進捗_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}
